<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 سبب يخليكِ سبيسيال ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF4F0;
            --page-color: #FFFFFF;
            --pink-accent: #FFE4E1;
            --gold-accent: #D4AF37;
            --text-dark: #4A3B32;
            --cover-bg: linear-gradient(135deg, #8c1c3f, #6b1530);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, var(--pink-accent) 0%, var(--bg-color) 70%);
            transition: all 0.5s ease;
        }

        .book-container {
            position: relative;
            width: 85vw;
            max-width: 380px;
            aspect-ratio: 1 / 1.414;
            perspective: 2500px;
            margin-bottom: 30px;
            box-shadow: -15px 20px 40px rgba(0,0,0,0.15);
            border-radius: 4px 12px 12px 4px;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            right: 0;
            background-color: var(--page-color);
            border-radius: 4px 12px 12px 4px;
            transform-origin: right center;
            transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1), box-shadow 0.9s;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 25px;
            backface-visibility: hidden;
            border-right: 3px solid rgba(212,175,55,0.3);
            
            background-image: linear-gradient(to left, rgba(0,0,0,0.02) 0%, rgba(255,255,255,0) 10%),
                              url("data:image/svg+xml,%3Csvg width='150' height='150' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='150' height='150' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        }

        .page.cover-page {
            background: var(--cover-bg);
            border: none;
            border-right: 5px solid #4a0e21;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.3), inset -3px 0 5px rgba(255,255,255,0.1);
        }

        .page.cover-page h1 {
            color: #D4AF37;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.6);
            font-size: 2.4rem;
            line-height: 1.3;
        }

        .page.flipped {
            transform: rotateY(180deg);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
        }

        .page::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 20%);
            opacity: 0;
            transition: opacity 0.9s;
            border-radius: inherit;
            pointer-events: none;
        }

        .page.flipped::after {
            opacity: 1;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: var(--gold-accent);
            margin-bottom: 15px;
        }

        .reason-number {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--pink-accent);
            margin-bottom: 20px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.05);
            opacity: 0.8;
        }

        .reason-text {
            font-size: 1.5rem;
            color: var(--text-dark);
            line-height: 1.7;
            font-weight: 600;
        }

        .decoration {
            font-size: 1.8rem;
            margin: 25px 0;
            color: var(--gold-accent);
            opacity: 0.7;
        }

        .navigation-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            background: rgba(255, 255, 255, 0.8);
            padding: 12px 30px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            transition: transform 0.3s, color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            color: var(--gold-accent);
            transform: scale(1.2);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-counter {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dark);
            min-width: 60px;
            text-align: center;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="app-wrapper" id="app">

        <div class="book-container" id="book">
        </div>

        <div class="navigation-bar">
            <button class="nav-btn" id="next-btn" title="الصفحة التالية">❮</button>
            <span class="page-counter" id="counter"></span>
            <button class="nav-btn" id="prev-btn" title="الصفحة السابقة" disabled>❯</button>
        </div>

    </div>

    <script>
        const pagesData = [
            { type: 'cover', title: '20 سبب يخليكِ<br>سبيسيال' },
            { type: 'reason', num: 1, text: 'لأنك نعمة جميلة جدا' },
            { type: 'reason', num: 2, text: 'بحب فيكِ عيونك وملامحك' },
            { type: 'reason', num: 3, text: 'لأنك بتخلي الكلام معك مختلف جدا' },
            { type: 'reason', num: 4, text: 'بحب فيكِ أنك ما تغيرتي من لما عرفتك' },
            { type: 'reason', num: 5, text: 'لأنك الشخص اللي رح اختاره دايما' },
            { type: 'reason', num: 6, text: 'بحب فيكِ سوالفك وبحب اسمعها' },
            { type: 'reason', num: 7, text: 'لأن ضحكتك بتغير يومي' },
            { type: 'reason', num: 8, text: 'بحب فيكِ أنك انتي ، ومافي شبهك أبدا' },
            { type: 'reason', num: 9, text: 'لأنك بتعطيني سبب اكون شخص احسن' },
            { type: 'reason', num: 10, text: 'بحب فيكِ حتى تفاصيلك الصغيرة' },
            { type: 'reason', num: 11, text: 'لأن وجودك بخلي كل إشي احلى' },
            { type: 'reason', num: 12, text: 'بحب فيكِ أنك على طبيعتك' },
            { type: 'reason', num: 13, text: 'لأنك بتخلي اللحظات العادية مميزة' },
            { type: 'reason', num: 14, text: 'بحب فيكِ أنك بتشاركي يومك معاي' },
            { type: 'reason', num: 15, text: 'بحب فيكِ صوتك لأنه اكثر إشي بحب اسمعه' },
            { type: 'reason', num: 16, text: 'لأنك الشخص اللي اريد احكيله كل إشي' },
            { type: 'reason', num: 17, text: 'بحب فيكِ أنك احلى صدفة صارت معاي' },
            { type: 'reason', num: 18, text: 'لأنك بتخليني ابتسم بدون سبب' },
            { type: 'reason', num: 19, text: 'بحب فيكِ انك شطورة وفنانة بالطبخ' },
            { type: 'reason', num: 20, text: 'لأنك بيان وهو سبب كافي' },
            { type: 'end', text: '20 سبب من مليون انك سبيسيال<br><br>لأنه وجودك لحاله احلى سبب' }
        ];

        const book = document.getElementById('book');
        const counterEl = document.getElementById('counter');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const bgMusic = document.getElementById('bg-music');
        
        let currentPage = 0;
        const totalPages = pagesData.length;
        let isMusicPlaying = false; 

        // دالة تشغيل الموسيقى
        function startMusic() {
            if (!isMusicPlaying) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                }).catch(e => {
                    console.log("المتصفح يطلب تفاعل مباشر لتشغيل الصوت");
                });
            }
        }

        // ربط تشغيل الموسيقى بأي نقرة أو لمسة على الشاشة
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });

        pagesData.forEach((data, index) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.style.zIndex = totalPages - index; 

            let contentHTML = '';

            if (data.type === 'cover') {
                pageDiv.classList.add('cover-page');
                contentHTML = `
                    <div class="decoration">✨</div>
                    <h1>${data.title}</h1>
                    <div class="decoration">✨</div>
                `;
            } else if (data.type === 'end') {
                contentHTML = `
                    <div class="decoration">🌹</div>
                    <p class="reason-text">${data.text}</p>
                `;
            } else {
                contentHTML = `
                    <div class="reason-number">${data.num}</div>
                    <p class="reason-text">${data.text}</p>
                    <div class="decoration">✦</div>
                `;
            }

            pageDiv.innerHTML = contentHTML;
            book.appendChild(pageDiv);
        });

        const pages = document.querySelectorAll('.page');

        function updateUI() {
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === totalPages - 1;
            counterEl.innerText = `${currentPage + 1} / ${totalPages}`;
        }

        function flipNext() {
            if (currentPage < totalPages - 1) {
                pages[currentPage].classList.add('flipped');
                currentPage++;
                updateUI();
                startMusic(); // محاولة تشغيل الصوت عند تقليب الصفحة إذا لم تعمل بعد
            }
        }

        function flipPrev() {
            if (currentPage > 0) {
                currentPage--;
                pages[currentPage].classList.remove('flipped');
                updateUI();
                startMusic();
            }
        }

        nextBtn.addEventListener('click', flipNext);
        prevBtn.addEventListener('click', flipPrev);

        let touchstartX = 0;
        let touchendX = 0;
        
        book.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        book.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 40;
            if (touchendX < touchstartX - swipeThreshold) {
                flipNext();
            }
            if (touchendX > touchstartX + swipeThreshold) {
                flipPrev();
            }
        }

        updateUI();
    </script>
</body>
</html>
